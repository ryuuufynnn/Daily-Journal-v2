<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Journal Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.469.0"></script>
  <link rel="icon" type="image/jpg" href="newlogo.png">
  <link rel="stylesheet" href="css/style.css">
  

</head>
<body class="bg-[#1A182E] text-gray-100 font-sans">

  <div id="admin-login" class="flex flex-col items-center justify-center min-h-screen">
    <div class="bg-[#222046] p-8 rounded-xl shadow-2xl max-w-md w-full border border-gray-700">
      <h1 class="text-3xl font-bold text-center mb-6 text-indigo-400">Admin Dashboard Login</h1>
      <input id="admin-username" type="text" placeholder="Username" class="w-full mb-4 p-3 bg-gray-800 border border-gray-600 rounded-lg text-gray-100" />
      <input id="admin-password" type="password" placeholder="Password" class="w-full mb-6 p-3 bg-gray-800 border border-gray-600 rounded-lg text-gray-100" />
      <button id="admin-login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-semibold">Login</button>
      <p id="admin-login-msg" class="mt-4 text-center text-gray-400"></p>
    </div>
  </div>

  <div id="admin-dashboard" class="hidden p-8">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Admin Dashboard</h1>
      <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">Logout</button>
    </div>

    <div class="bg-[#222046] p-6 rounded-xl border border-gray-700 mb-8">
      <h2 class="text-xl font-semibold text-yellow-300 mb-3">User Uploads Overview</h2>
      <p class="text-gray-400 text-sm mb-4">All uploaded journal entries from users (images remain in Cloudinary when deleted).</p>
      <div id="admin-entries" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <p class="text-red-400 text-center col-span-3">Error loading entries: Missing or insufficient permissions.</p>
      </div>
    </div>
  </div>

  // loading spinner
  <div id="loading-spinner" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-[#222046] p-6 rounded-xl shadow-2xl">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mx-auto"></div>
      <p class="text-center mt-4 text-indigo-300">Processing...</p>
    </div>
  </div>

    <script type="module" src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/image-modal.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
