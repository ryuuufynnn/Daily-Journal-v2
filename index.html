<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lau Daily</title>
    <!-- linking -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="logo/logo-v3.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style.css?v=3">

    <script src="https://unpkg.com/lucide@0.469.0"></script>
    
    <!-- global variables -->
    <script>
        window.currentUserId = null;
        window.currentUserEmail = null;
        window.isAuthReady = false;
        window.appJsLoaded = false;
    </script>
</head>
<body class="bg-[var(--bg-dark)] min-h-screen">
    <!-- Auth Container -->
    <div id="auth-container" class="fixed inset-0 flex items-center justify-center p-4 bg-[var(--bg-dark)] z-50">
        <div class="bg-[var(--bg-sidebar)] p-10 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
            <div id="auth-form-container"></div>
            <p id="auth-message" class="text-center mt-4"></p>
        </div>
    </div>

    <div id="app-container" class="hidden flex">
        <aside id="sidebar" class="sidebar flex flex-col fixed top-0 left-0 transition-all duration-300 ease-in-out md:relative md:flex">
            <div class="p-6 border-b border-[#3A386D] mb-4">
                <h1 class="text-3xl font-extrabold text-white">Daily Journal</h1>
                <p id="sidebar-greeting" class="text-sm text-gray-400 mt-1">Hello, User!</p>
            </div>

            <div class="flex flex-col flex-grow px-1 space-y-1">
                <div id="nav-timeline" class="nav-item active" onclick="navigateTo('timeline')">
                    <i data-lucide="layout-list" class="nav-item-icon w-5 h-5"></i> Timeline
                </div>
                <div id="nav-upload" class="nav-item" onclick="navigateTo('upload')">
                    <i data-lucide="upload-cloud" class="nav-item-icon w-5 h-5"></i> Upload Entry
                </div>
                <div id="nav-profile" class="nav-item" onclick="navigateTo('profile')">
                    <i data-lucide="user" class="nav-item-icon w-5 h-5"></i> Profile
                </div>
                <div id="nav-contact" class="nav-item" onclick="navigateTo('contact')">
                    <i data-lucide="mail" class="nav-item-icon w-5 h-5"></i> Developer
                </div>

                <div class="mt-auto mx-4 p-3 bg-gray-800 rounded-lg text-xs text-gray-500">
                    <p class="font-semibold mb-1">Keep smiling everyday!</p>
                    <p class="break-all font-mono text-gray-300">You can't change the people around you, but you can change the people around you.</p>
                </div>
            </div>

            <div class="p-4">
                <div class="nav-item log-out-btn" onclick="handleLogout()">
                    <i data-lucide="log-out" class="nav-item-icon w-5 h-5 text-red-400"></i> <span class="text-red-400">Logout</span>
                </div>
            </div>
        </aside>
        <div id="overlay" class="hidden md:hidden" onclick="toggleSidebar()"></div>

        <div class="flex-grow w-full">
            <header class="fixed-header fixed top-0 left-0 right-0 md:hidden bg-[var(--bg-dark)] shadow-md p-4 flex items-center justify-between z-90">
                <button onclick="toggleSidebar()" class="text-gray-300">
                    <i id="menu-icon" data-lucide="menu" class="w-6 h-6"></i>
                    <i id="close-icon" data-lucide="x" class="w-6 h-6 hidden"></i>
                </button>
                <h2 id="mobile-header-title" class="text-lg font-bold text-white truncate mx-4">Journal</h2>
                <div class="w-6 h-6"></div>
            </header>

            <main id="main-content-area" class="main-content-area p-4 md:p-12 w-full min-h-screen max-w-7xl mx-auto"></main>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center bg-[var(--bg-dark)] z-50">
        <div class="loader">
            Loading...
        </div> 
    </div>

    <!-- Image modal (shared) -->
    <div id="image-modal" class="hidden fixed inset-0 z-[10000] bg-black bg-opacity-70 flex items-center justify-center p-4">
        <div class="modal-inner relative max-w-[96vw] max-h-[96vh]">
            <button class="modal-close absolute -top-3 -right-3 bg-black text-white rounded-full p-2" aria-label="Close image">&#10005;</button>
            <img id="image-modal-img" src="" alt="Full view" class="max-w-full max-h-[80vh] rounded-md block mx-auto" />
            <div id="image-modal-caption" class="modal-caption mt-2 text-center text-gray-200"></div>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK / backend-->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/image-modal.js"></script>
    <script src="js/login.js"></script>
    <script src="js/service-worker.js"></script>
    
</body>
</html>
